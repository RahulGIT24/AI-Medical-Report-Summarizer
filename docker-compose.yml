services:
  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=healthscan
    ports:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - health-net
  redis:
    image: redis
    restart: always
    ports:
      - "6379"
    networks:
      - health-net
  qdrant:
    image: qdrant/qdrant
    restart: always
    ports:
      - "6333"
    networks:
      - health-net
    volumes:
      - qdrant-data:/qdrant/storage

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_BASE_URL=http://127.0.0.1:5000
    ports:
      - 5173:80
    depends_on:
      - backend
    networks:
      - health-net
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - 5000:5000
    depends_on:
      - redis
      - db
      - qdrant
    env_file:
      - ./backend/.docker.env
    networks:
      - health-net
volumes:
  postgres-data:
  qdrant-data:
networks:
  health-net: